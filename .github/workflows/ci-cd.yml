name: CRMS CI/CD

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:14
        env:
          POSTGRES_DB: crms
          POSTGRES_USER: user
          POSTGRES_PASSWORD: password
        ports:
          - 5432:5432
      redis:
        image: redis:7
        ports:
          - 6379:6379

    steps:
      - uses: actions/checkout@v3

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: "17"
          distribution: "temurin"
          cache: maven

      - name: Build with Maven
        run: mvn -B package --file crms-api/pom.xml

      - name: Security Scan (OWASP)
        run: mvn org.owasp:dependency-check-maven:${{ env.DEPENDENCY_CHECK_VERSION }}:check --file crms-api/pom.xml
        env:
          NVD_API_KEY: ${{ secrets.NVD_API_KEY }}
          DEPENDENCY_CHECK_VERSION: 12.1.0

      - name: Docker Build & Push
        if: github.event_name == 'push'
        run: |
          echo "Docker build and push to registry logic here"
