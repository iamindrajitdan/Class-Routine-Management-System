apiVersion: apps/v1
kind: Deployment
metadata:
  name: crms-api
  labels:
    app: crms-api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: crms-api
  template:
    metadata:
      labels:
        app: crms-api
    spec:
      containers:
      - name: crms-api
        image: crms-api:latest
        ports:
        - containerPort: 8080
        env:
        - name: SPRING_DATASOURCE_URL
          value: jdbc:postgresql://postgres-service:5432/crms
        - name: SPRING_REDIS_HOST
          value: redis-service
        resources:
          limits:
            cpu: "1"
            memory: "2Gi"
          requests:
            cpu: "500m"
            memory: "1Gi"
        readinessProbe:
          httpGet:
            path: /actuator/health/readiness
            port: 8080
          initialDelaySeconds: 30
          periodSeconds: 10
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: crms-frontend
  labels:
    app: crms-frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: crms-frontend
  template:
    metadata:
      labels:
        app: crms-frontend
    spec:
      containers:
      - name: crms-frontend
        image: crms-frontend:latest
        ports:
        - containerPort: 80
