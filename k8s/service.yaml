apiVersion: v1
kind: Service
metadata:
  name: crms-api-service
spec:
  selector:
    app: crms-api
  ports:
  - protocol: TCP
    port: 8080
    targetPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: crms-frontend-service
spec:
  selector:
    app: crms-frontend
  ports:
  - protocol: TCP
    port: 80
    targetPort: 80
